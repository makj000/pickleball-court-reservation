AWSTemplateFormatVersion: "2010-09-09"
Description: Pickleball monitor infrastructure around the existing Lambda, buckets, and image repository.

Parameters:
  FunctionName:
    Type: String
  LambdaRoleName:
    Type: String
  UiBucketName:
    Type: String
  WorkQueueName:
    Type: String
  QueuePolicyName:
    Type: String
    Default: pickleball-monitor-work-queue

Resources:
  WorkQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: !Ref WorkQueueName
      VisibilityTimeout: 1200
      ReceiveMessageWaitTimeSeconds: 20
      MessageRetentionPeriod: 86400

  LambdaSqsPolicy:
    Type: AWS::IAM::RolePolicy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RoleName: !Ref LambdaRoleName
      PolicyName: !Ref QueuePolicyName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ChangeMessageVisibility
            Resource: !GetAtt WorkQueue.Arn

  LambdaQueueEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Ref FunctionName
      EventSourceArn: !GetAtt WorkQueue.Arn
      BatchSize: 1
      Enabled: true

  BookingAgentPrepRule:
    Type: AWS::Events::Rule
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: booking-agent-prep
      ScheduleExpression: cron(30 14 ? * SAT,SUN *)
      State: ENABLED
      Targets:
        - Id: lambda
          Arn: !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${FunctionName}
          Input: '{"_booking_agent":true,"phase":"prep"}'

  BookingAgentReportRule:
    Type: AWS::Events::Rule
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: booking-agent-report
      ScheduleExpression: cron(30 15 * * ? *)
      State: ENABLED
      Targets:
        - Id: lambda
          Arn: !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${FunctionName}
          Input: '{"_booking_agent":true,"phase":"report"}'

  BookingAgentPrepInvokePermission:
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Ref FunctionName
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt BookingAgentPrepRule.Arn

  BookingAgentReportInvokePermission:
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Ref FunctionName
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt BookingAgentReportRule.Arn

  FunctionUrlInvokePermission:
    Type: AWS::Lambda::Permission
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      FunctionName: !Ref FunctionName
      Action: lambda:InvokeFunction
      Principal: "*"
      InvokedViaFunctionUrl: true

  UiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Bucket: !Ref UiBucketName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource:
              - !Sub arn:${AWS::Partition}:s3:::${UiBucketName}/index.html
              - !Sub arn:${AWS::Partition}:s3:::${UiBucketName}/config.js
              - !Sub arn:${AWS::Partition}:s3:::${UiBucketName}/img/*

Outputs:
  WorkQueueUrl:
    Value: !Ref WorkQueue
  WorkQueueArn:
    Value: !GetAtt WorkQueue.Arn
  BookingAgentPrepRuleArn:
    Value: !GetAtt BookingAgentPrepRule.Arn
  BookingAgentReportRuleArn:
    Value: !GetAtt BookingAgentReportRule.Arn
